<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Roblox Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Sailor Piece Tracker</h1>

    <input type="text" id="search" placeholder="Search player...">

    <div id="results"></div>

    <div id="profile" class="card hidden">
      <h2 id="username"></h2>
      <p class="level">Level <span id="level"></span></p>

      <div id="totalProgress"></div>

      <div id="stats"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
